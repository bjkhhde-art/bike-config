<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <title>Bike Config</title>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#111111"/>

  <!-- Rear wheel -->
  <circle cx="152" cy="318" r="90" fill="none" stroke="#FF7A00" stroke-width="22"/>
  <circle cx="152" cy="318" r="10" fill="#FF7A00"/>

  <!-- Front wheel -->
  <circle cx="368" cy="318" r="90" fill="none" stroke="#FF7A00" stroke-width="22"/>
  <circle cx="368" cy="318" r="10" fill="#FF7A00"/>

  <!-- Bottom bracket -->
  <circle cx="258" cy="272" r="10" fill="#FF7A00"/>

  <!-- Chainstay -->
  <line x1="152" y1="318" x2="258" y2="272" stroke="#FF7A00" stroke-width="17" stroke-linecap="round"/>
  <!-- Seat stay -->
  <line x1="152" y1="318" x2="218" y2="170" stroke="#FF7A00" stroke-width="14" stroke-linecap="round"/>
  <!-- Seat tube -->
  <line x1="218" y1="170" x2="258" y2="272" stroke="#FF7A00" stroke-width="16" stroke-linecap="round"/>
  <!-- Down tube -->
  <line x1="346" y1="214" x2="258" y2="272" stroke="#FF7A00" stroke-width="17" stroke-linecap="round"/>
  <!-- Top tube -->
  <line x1="218" y1="170" x2="338" y2="188" stroke="#FF7A00" stroke-width="14" stroke-linecap="round"/>
  <!-- Head tube -->
  <line x1="337" y1="187" x2="346" y2="215" stroke="#FF7A00" stroke-width="17" stroke-linecap="round"/>

  <!-- Suspension fork — two legs + bridge -->
  <line x1="334" y1="212" x2="354" y2="316" stroke="#FF7A00" stroke-width="14" stroke-linecap="round"/>
  <line x1="349" y1="212" x2="369" y2="316" stroke="#FF7A00" stroke-width="14" stroke-linecap="round"/>
  <line x1="336" y1="266" x2="367" y2="266" stroke="#FF7A00" stroke-width="11" stroke-linecap="round"/>

  <!-- Saddle post -->
  <line x1="218" y1="170" x2="213" y2="136" stroke="#FF7A00" stroke-width="12" stroke-linecap="round"/>
  <!-- Saddle -->
  <line x1="190" y1="130" x2="237" y2="130" stroke="#FF7A00" stroke-width="15" stroke-linecap="round"/>
  <line x1="190" y1="130" x2="196" y2="141" stroke="#FF7A00" stroke-width="10" stroke-linecap="round"/>
  <line x1="237" y1="130" x2="231" y2="141" stroke="#FF7A00" stroke-width="10" stroke-linecap="round"/>

  <!-- Stem -->
  <line x1="337" y1="187" x2="378" y2="170" stroke="#FF7A00" stroke-width="12" stroke-linecap="round"/>
  <!-- Bar rise -->
  <line x1="378" y1="170" x2="378" y2="153" stroke="#FF7A00" stroke-width="11" stroke-linecap="round"/>
  <!-- Handlebar -->
  <line x1="355" y1="155" x2="401" y2="155" stroke="#FF7A00" stroke-width="13" stroke-linecap="round"/>
</svg>
